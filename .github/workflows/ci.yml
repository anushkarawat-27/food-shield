name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # CBC (the open-source MILP solver PuLP uses) ships with the pulp pip
        # wheel on Linux, but apt's coinor-cbc is a useful fallback and is
        # cheap to install.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends coinor-cbc
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train projector models
        run: python -m simulator.train_projector

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run backtest (smoke)
        run: python -m scripts.backtest
